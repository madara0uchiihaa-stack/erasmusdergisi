<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Dijital Dergi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>

    <div id="home-screen" class="screen">
        <div class="hero-container">
            <h1 class="title">Premium <span class="highlight">Magazine</span></h1>
            <p class="subtitle">Modern, hızlı ve etkileşimli dijital okuma deneyimi.</p>
            
            <div class="action-buttons">
                <button id="btn-read" class="btn btn-primary">
                    <i class="fa-solid fa-book-open"></i> Dergiyi Oku
                </button>
                
                <label for="pdf-upload" class="btn btn-secondary">
                    <i class="fa-solid fa-upload"></i> Kendi PDF'ini Yükle
                </label>
                <input type="file" id="pdf-upload" accept=".pdf" style="display: none;">
            </div>
        </div>
    </div>

    <div id="viewer-screen" class="screen hidden">
        <header class="viewer-header">
            <button id="btn-back" class="nav-btn" title="Ana Sayfaya Dön">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <span id="book-title">Dijital Dergi</span>
            <div class="page-controls">
                <button id="btn-prev" class="control-btn"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="page-info">Sayfa: <span id="current-page">0</span> / <span id="total-pages">0</span></span>
                <button id="btn-next" class="control-btn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </header>

        <main class="flipbook-container">
            <div id="flipbook" class="flipbook">
                </div>
        </main>
    </div>

    <div id="loader" class="loader-container hidden">
        <div class="spinner"></div>
        <p>PDF İşleniyor, Lütfen Bekleyin...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
